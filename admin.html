<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Administrativo - Lemon Hair</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #111;
  color: #fff;
}

/* LOGIN */

.login-box {
  max-width: 400px;
  margin: 120px auto;
  padding: 40px;
  background: #1a1a1a;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,.5);
}

.login-box h2 {
  color: #9aff3d;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

.login-box button {
  width: 100%;
  padding: 12px;
  background: #9aff3d;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

#erroLogin {
  color: #ff4d4d;
  margin-top: 10px;
}

/* LAYOUT */

.admin-layout {
  display: flex;
}

.sidebar {
  width: 230px;
  background: #1a1a1a;
  min-height: 100vh;
  padding: 30px;
}

.sidebar h2 {
  color: #9aff3d;
}

.sidebar button {
  display: block;
  width: 100%;
  margin: 15px 0;
  padding: 10px;
  background: none;
  border: 1px solid #9aff3d;
  color: #9aff3d;
  border-radius: 10px;
  cursor: pointer;
  transition: .2s;
}

.sidebar button:hover {
  background: #9aff3d;
  color: #000;
}

.conteudo {
  flex: 1;
  padding: 40px;
}

h1 {
  margin-bottom: 30px;
}

/* CARDS */

.cards-resumo {
  display: flex;
  gap: 20px;
  margin-bottom: 40px;
}

.card-admin {
  flex: 1;
  background: #1a1a1a;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

.card-admin h3 {
  color: #9aff3d;
}

.card-admin p {
  font-size: 2rem;
  margin-top: 10px;
}

/* HISTÓRICO */

.filtro-mes {
  margin-bottom: 20px;
}

.filtro-mes input {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

.tabela-box {
  background: #1a1a1a;
  border-radius: 20px;
  padding: 20px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  color: #9aff3d;
  text-align: left;
  padding-bottom: 10px;
}

td {
  padding: 10px 0;
  border-bottom: 1px solid #333;
}

/* CARDS AGENDAMENTOS (caso use card view) */

.agendamento-card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

.agendamento-topo {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.valor {
  color: #9aff3d;
  font-weight: bold;
}

.btn-cancelar {
  margin-top: 10px;
  background: #ff4d4d;
  border: none;
  padding: 8px 15px;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.hidden {
  display: none;
}

canvas {
  margin-top: 30px;
  max-height: 300px;
}

@media (max-width: 900px) {
  .cards-resumo {
    flex-direction: column;
  }

  .admin-layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    min-height: auto;
  }
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginContainer" class="login-box">
  <h2>🔐 Painel Lemon Hair</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginSenha" placeholder="Senha">
  <button onclick="loginAdmin()">Entrar</button>
  <p id="erroLogin"></p>
</div>

<!-- PAINEL -->
<div id="painelContainer" class="admin-layout" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Lemon Hair</h2>
    <button onclick="mostrarSecao('dashboard')">Dashboard</button>
    <button onclick="mostrarSecao('historico')">Agendamentos</button>
    <button onclick="logoutAdmin()">Sair</button>
  </aside>

  <!-- CONTEÚDO -->
  <main class="conteudo">

    <!-- DASHBOARD -->
    <section id="dashboard" class="secao">
      <h1>📊 Dashboard</h1>

      <div class="filtro-mes">
        <input type="month" id="filtroMes">
      </div>

      <div class="cards-resumo">
        <div class="card-admin">
          <h3>Agendamentos</h3>
          <p id="totalAgendamentos">0</p>
        </div>

        <div class="card-admin">
          <h3>Faturamento</h3>
          <p id="faturamentoMes">R$ 0</p>
        </div>
      </div>

      <canvas id="graficoProfissionais"></canvas>
      <canvas id="graficoServicos"></canvas>

    </section>

    <!-- HISTÓRICO -->
    <section id="historico" class="secao hidden">
      <h1>📋 Histórico de Agendamentos</h1>

      <div class="tabela-box">
        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Profissional</th>
              <th>Serviço</th>
              <th>Data</th>
              <th>Hora</th>
              <th>Valor</th>
            </tr>
          </thead>
          <tbody id="listaAgendamentos"></tbody>
        </table>
      </div>

    </section>

  </main>
</div>

</body>
</html>
